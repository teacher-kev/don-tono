<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container col-xl-10 col-xxl-8 px-4 py-5"> 
        <div class="row align-items-center g-lg-5 py-5"> 
            <div class="col-lg-7 text-center text-lg-start"> 
                <h1 class="display-4 fw-bold lh-1 text-body-emphasis mb-3">Vertically centered hero sign-up form</h1>
                <img class="w-50" src="img/authentication-1-3.png" alt="">
            </div> 
            <div class="col-md-10 mx-auto col-lg-5"> 
                <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary" method="POST" action="php/login.php"> 
                    <div class="form-floating mb-3"> 
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" name="correo"> 
                        <label for="floatingInput">Correo Electrónico</label> 
                    </div> 
                    <div class="form-floating mb-3"> 
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password"> 
                        <label for="floatingPassword">Contraseña</label> 
                    </div> 
                     
                    <button class="w-100 btn btn-lg btn-primary" type="submit">Iniciar Sesión</button> 
                    <hr class="my-4"> 
                    <small class="text-body-secondary">By clicking Sign up, you agree to the terms of use.</small> 
                    </form> 
            </div> 
        </div> 
    </div>
